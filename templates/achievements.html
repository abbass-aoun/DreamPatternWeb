<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - DreamFlow</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">✨ DreamFlow</div>
            <ul class="navbar-nav">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/achievements">Achievements</a></li>
                <li><a href="/shop">Shop</a></li>
                <li><a href="/chat">AI Analysis</a></li>
                <li><a href="/subscription">Subscription</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding: 3rem 2rem;">
        <div style="max-width: 900px; margin: 0 auto;">
            <div class="text-center mb-3">
                <h1>🏆 Achievements</h1>
                <p class="text-muted">Unlock achievements and earn XP & Dream Coins!</p>
            </div>

            <div id="achievementsList">
                <p class="text-muted text-center">Loading achievements...</p>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/game.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if (!user) return;
            await loadAchievements(user.user_id);
        });
    </script>
</body>
</html>
