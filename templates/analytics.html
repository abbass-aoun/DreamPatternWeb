<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - DreamFlow</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #080b14; overflow-x: hidden; }
        #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .orb { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; z-index: 0; animation: drift 20s ease-in-out infinite alternate; }
        .orb-1 { width: 600px; height: 600px; background: #6366f1; top: -200px; left: -150px; }
        .orb-2 { width: 400px; height: 400px; background: #06b6d4; bottom: -100px; right: -80px; animation-delay: -8s; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px,25px); } }
        .navbar { background: rgba(8,11,20,0.75); border-bottom: 1px solid rgba(99,102,241,0.12); position: relative; z-index: 100; }
        .navbar-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; }
        .navbar-nav a { font-family: 'DM Sans', sans-serif; font-size: 0.875rem; }
        .btn { font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; border-radius: 0.6rem; }

        .page-wrap { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
        .page-header { margin-bottom: 2.5rem; }
        .page-header h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: #e2e8f0; margin-bottom: 0.3rem; }
        .page-header p { font-size: 0.85rem; color: #475569; font-style: italic; }
        .chart-card {
            background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 1.5rem; padding: 2rem; backdrop-filter: blur(12px); margin-bottom: 1.5rem;
        }
        .chart-card h3 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; color: #e2e8f0; margin-bottom: 1.25rem; }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">✦ DreamFlow</div>
            <ul class="navbar-nav">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/add-dream">Add Dream</a></li>
                <li><a href="/analytics">Analytics</a></li>
                <li><a href="/chat">AI Analysis</a></li>
                <li><a href="/subscription">Subscription</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="page-header">
            <h1>📊 Dream Analytics</h1>
            <p>Discover patterns and insights from your dreams</p>
        </div>

        <div class="chart-card">
            <h3>Most Common Emotions</h3>
            <canvas id="emotionChart" style="max-height:380px;"></canvas>
        </div>

        <div class="chart-card">
            <h3>Dream Intensity Trends</h3>
            <canvas id="intensityChart" style="max-height:280px;"></canvas>
        </div>

        <div class="chart-card">
            <h3>Most Common Themes</h3>
            <canvas id="themeChart" style="max-height:380px;"></canvas>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        (function(){
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
            function init(){ resize(); stars=Array.from({length:100},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.2+0.2,o:Math.random()*0.5+0.1,s:Math.random()*0.003+0.001,d:Math.random()>0.5?1:-1})); }
            function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{ s.o+=s.s*s.d; if(s.o>0.6||s.o<0.1)s.d*=-1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(148,163,184,${s.o})`; ctx.fill(); }); requestAnimationFrame(draw); }
            window.addEventListener('resize',init); init(); draw();
        })();

        Chart.defaults.color = '#475569';
        Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';

        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if (!user) return;
            await loadEmotionChart(user.user_id);
            await loadIntensityChart(user.user_id);
            await loadThemeChart(user.user_id);
        });

        async function loadEmotionChart(userId) {
            try {
                const response = await fetch(`${API_BASE}/stats/emotions/${userId}`);
                const data = await response.json();
                const ctx = document.getElementById('emotionChart').getContext('2d');
                new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: data.map(item => item.emotion_type),
                        datasets: [{ data: data.map(item => item.frequency), backgroundColor: ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#14b8a6'], borderWidth: 0 }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#64748b', padding: 16 } } } }
                });
            } catch (error) { console.error('Load emotion chart error:', error); }
        }

        async function loadIntensityChart(userId) {
            try {
                const response = await fetch(`${API_BASE}/dreams/user/${userId}`);
                const dreams = await response.json();
                const dateMap = {};
                dreams.forEach(dream => {
                    const date = new Date(dream.dream_date).toLocaleDateString();
                    if (!dateMap[date]) dateMap[date] = [];
                    dateMap[date].push(dream.intensity);
                });
                const dates = Object.keys(dateMap).sort();
                const avgIntensities = dates.map(date => { const i = dateMap[date]; return i.reduce((a,b)=>a+b,0)/i.length; });
                const ctx = document.getElementById('intensityChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: dates, datasets: [{ label: 'Average Intensity', data: avgIntensities, borderColor: '#818cf8', backgroundColor: 'rgba(99,102,241,0.08)', tension: 0.4, fill: true, pointBackgroundColor: '#818cf8', pointRadius: 4 }] },
                    options: { responsive: true, scales: { y: { beginAtZero: true, max: 10, grid: { color: 'rgba(255,255,255,0.04)' } }, x: { grid: { color: 'rgba(255,255,255,0.04)' } } } }
                });
            } catch (error) { console.error('Load intensity chart error:', error); }
        }

        async function loadThemeChart(userId) {
            try {
                const response = await fetch(`${API_BASE}/stats/themes/${userId}`);
                const data = await response.json();
                const ctx = document.getElementById('themeChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: { labels: data.map(item => item.theme_name), datasets: [{ label: 'Frequency', data: data.map(item => item.dream_count), backgroundColor: 'rgba(139,92,246,0.6)', borderColor: 'rgba(139,92,246,0.8)', borderWidth: 1, borderRadius: 6 }] },
                    options: { responsive: true, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.04)' } }, x: { grid: { color: 'rgba(255,255,255,0.04)' } } } }
                });
            } catch (error) { console.error('Load theme chart error:', error); }
        }
    </script>
</body>
</html>
