<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - DreamFlow</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand"> DreamFlow</div>
            <ul class="navbar-nav">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/add-dream">Add Dream</a></li>
                <li><a href="/analytics">Analytics</a></li>
                <li><a href="/chat">AI Analysis</a></li>
                <li><a href="/subscription">Subscription</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding: 3rem 2rem;">
        <h1> Dream Analytics</h1>
        <p class="text-muted mb-3">Discover patterns and insights from your dreams</p>

        <!-- Emotion Distribution -->
        <div class="card">
            <h3>Most Common Emotions</h3>
            <canvas id="emotionChart" style="max-height: 400px;"></canvas>
        </div>

        <!-- Intensity Over Time -->
        <div class="card mt-3">
            <h3>Dream Intensity Trends</h3>
            <canvas id="intensityChart" style="max-height: 300px;"></canvas>
        </div>

        <!-- Theme Frequency -->
        <div class="card mt-3">
            <h3>Most Common Themes</h3>
            <canvas id="themeChart" style="max-height: 400px;"></canvas>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if (!user) return;

            await loadEmotionChart(user.user_id);
            await loadIntensityChart(user.user_id);
            await loadThemeChart(user.user_id);
        });

        async function loadEmotionChart(userId) {
            try {
                // Call your stored procedure!
                const response = await fetch(`${API_BASE}/stats/emotions/${userId}`);
                const data = await response.json();

                const ctx = document.getElementById('emotionChart').getContext('2d');
                new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: data.map(item => item.emotion_type),
                        datasets: [{
                            data: data.map(item => item.frequency),
                            backgroundColor: [
                                '#6366f1', '#8b5cf6', '#ec4899', '#f59e0b',
                                '#10b981', '#3b82f6', '#ef4444', '#14b8a6'
                            ]
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            } catch (error) {
                console.error('Load emotion chart error:', error);
            }
        }

        async function loadIntensityChart(userId) {
            try {
                const response = await fetch(`${API_BASE}/dreams/user/${userId}`);
                const dreams = await response.json();

                // Group by date
                const dateMap = {};
                dreams.forEach(dream => {
                    const date = new Date(dream.dream_date).toLocaleDateString();
                    if (!dateMap[date]) dateMap[date] = [];
                    dateMap[date].push(dream.intensity);
                });

                const dates = Object.keys(dateMap).sort();
                const avgIntensities = dates.map(date => {
                    const intensities = dateMap[date];
                    return intensities.reduce((a, b) => a + b, 0) / intensities.length;
                });

                const ctx = document.getElementById('intensityChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [{
                            label: 'Average Intensity',
                            data: avgIntensities,
                            borderColor: '#6366f1',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 10
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Load intensity chart error:', error);
            }
        }

        async function loadThemeChart(userId) {
            try {
                // Use your complex query or stored procedure!
                const response = await fetch(`${API_BASE}/stats/themes/${userId}`);
                const data = await response.json();

                const ctx = document.getElementById('themeChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: data.map(item => item.theme_name),
                        datasets: [{
                            label: 'Frequency',
                            data: data.map(item => item.dream_count),
                            backgroundColor: '#8b5cf6'
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            } catch (error) {
                console.error('Load theme chart error:', error);
            }
        }
    </script>
</body>
</html>
