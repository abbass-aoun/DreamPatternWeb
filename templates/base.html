<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DreamFlow{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">✨ DreamFlow</div>
            <ul class="navbar-nav">
                <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                <li><a href="{{ url_for('add_dream') }}">Add Dream</a></li>
                <li><a href="{{ url_for('chat') }}">AI Analysis</a></li>
                <li><a href="{{ url_for('subscription') }}">Subscription</a></li>
                <li><a href="{{ url_for('logout') }}">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
