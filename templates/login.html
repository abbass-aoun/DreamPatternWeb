<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DreamFlow</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', 'Segoe UI', sans-serif; background: #080b14; overflow-x: hidden; }
        #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .orb { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; z-index: 0; animation: drift 20s ease-in-out infinite alternate; }
        .orb-1 { width: 500px; height: 500px; background: #6366f1; top: -150px; left: -100px; }
        .orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; right: -80px; animation-delay: -8s; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px,25px); } }

        .auth-container { position: relative; z-index: 2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-card { width: 100%; max-width: 420px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.5rem; padding: 2.5rem; backdrop-filter: blur(16px); }
        .auth-logo { font-family: 'Syne', 'Segoe UI', sans-serif; font-weight: 800; font-size: 1.2rem; color: #818cf8; text-align: center; margin-bottom: 2rem; letter-spacing: -0.02em; }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { font-family: 'Syne', 'Segoe UI', sans-serif; font-size: 1.75rem; font-weight: 800; color: #e2e8f0; margin-bottom: 0.4rem; }
        .auth-header p { font-size: 0.85rem; color: #475569; font-style: italic; }
        .form-label { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: #64748b; margin-bottom: 0.4rem; display: block; }
        .form-input { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 0.75rem; color: #e2e8f0; font-family: 'DM Sans', 'Segoe UI', sans-serif; transition: border-color 0.2s; }
        .form-input:focus { border-color: rgba(99,102,241,0.5); outline: none; background: rgba(99,102,241,0.05); }
        .btn { font-family: 'DM Sans', 'Segoe UI', sans-serif; font-size: 0.85rem; font-weight: 500; border-radius: 0.75rem; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: #475569; }
        .auth-footer a { color: #818cf8; text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { color: #a78bfa; }
        .password-input-wrapper { position: relative; }
        .password-toggle-btn { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #475569; padding: 0.25rem; transition: color 0.2s; }
        .password-toggle-btn:hover { color: #818cf8; }
        .eye-icon { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">✦ DreamFlow</div>
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to continue your dream journey</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" class="form-input password-input" placeholder="••••••••" required>
                        <button type="button" class="password-toggle-btn" id="togglePassword" aria-label="Toggle password visibility">
                            <svg class="eye-icon" id="eyeOpen" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                            </svg>
                            <svg class="eye-icon" id="eyeClosed" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
                                <path d="M17.94 17.94C16.2306 19.243 14.1491 20 12 20C5 20 1 12 1 12C2.24389 9.68192 3.96914 7.65663 6.06 6.06M9.9 4.24C10.5883 4.0789 11.2931 3.99834 12 4C19 4 23 12 23 12C22.393 13.1356 21.6691 14.2048 20.84 15.19M14.12 14.12C13.8454 14.4147 13.5141 14.6512 13.1462 14.8151C12.7782 14.9791 12.3809 15.0673 11.9781 15.0744C11.5753 15.0815 11.1752 15.0074 10.8016 14.8565C10.4281 14.7056 10.0887 14.4811 9.80385 14.1962C9.51897 13.9113 9.29439 13.572 9.14351 13.1984C8.99262 12.8249 8.91853 12.4247 8.92563 12.0219C8.93274 11.6191 9.02091 11.2219 9.18488 10.8539C9.34884 10.4859 9.58525 10.1547 9.88 9.88" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Login</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/register">Create one here</a>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        (function(){
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
            function init(){ resize(); stars=Array.from({length:80},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1+0.2,o:Math.random()*0.5+0.1,s:Math.random()*0.003+0.001,d:Math.random()>0.5?1:-1})); }
            function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{ s.o+=s.s*s.d; if(s.o>0.6||s.o<0.1)s.d*=-1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(148,163,184,${s.o})`; ctx.fill(); }); requestAnimationFrame(draw); }
            window.addEventListener('resize',init); init(); draw();

            const toggle = document.getElementById('togglePassword');
            const pw = document.getElementById('password');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');
            toggle.addEventListener('click', function(e){
                e.preventDefault();
                if(pw.type==='password'){ pw.type='text'; eyeOpen.style.display='none'; eyeClosed.style.display='block'; }
                else { pw.type='password'; eyeOpen.style.display='block'; eyeClosed.style.display='none'; }
            });
        })();
    </script>
</body>
</html>
