<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - DreamFlow</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #080b14; overflow-x: hidden; }
        #starfield { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .orb { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; z-index: 0; animation: drift 20s ease-in-out infinite alternate; }
        .orb-1 { width: 500px; height: 500px; background: #6366f1; top: -150px; left: -100px; }
        .orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; right: -80px; animation-delay: -8s; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px,25px); } }
        .auth-container { position: relative; z-index: 2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-card { width: 100%; max-width: 440px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.5rem; padding: 2.5rem; backdrop-filter: blur(16px); }
        .auth-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; color: #818cf8; text-align: center; margin-bottom: 2rem; }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { font-family: 'Syne', sans-serif; font-size: 1.75rem; font-weight: 800; color: #e2e8f0; margin-bottom: 0.4rem; }
        .auth-header p { font-size: 0.85rem; color: #475569; font-style: italic; }
        .form-label { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: #64748b; margin-bottom: 0.4rem; display: block; }
        .form-input { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 0.75rem; color: #e2e8f0; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; }
        .form-input:focus { border-color: rgba(99,102,241,0.5); outline: none; background: rgba(99,102,241,0.05); }
        .btn { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; border-radius: 0.75rem; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: #475569; }
        .auth-footer a { color: #818cf8; text-decoration: none; font-weight: 600; }
        .password-input-wrapper { position: relative; }
        .password-toggle-btn { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #475569; padding: 0.25rem; transition: color 0.2s; }
        .password-toggle-btn:hover { color: #818cf8; }
        .eye-icon { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">✦ DreamFlow</div>
            <div class="auth-header">
                <h1>Begin Your Journey</h1>
                <p>Create your account and get 7 days free trial</p>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="birthdate" class="form-label">Birth Date</label>
                    <input type="date" id="birthdate" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" class="form-input password-input" minlength="6" required>
                        <button type="button" class="password-toggle-btn" id="togglePassword" aria-label="Toggle password visibility">
                            <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none"><path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
                            <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" style="display:none;"><path d="M17.94 17.94C16.2306 19.243 14.1491 20 12 20C5 20 1 12 1 12C2.24389 9.68192 3.96914 7.65663 6.06 6.06M9.9 4.24C10.5883 4.0789 11.2931 3.99834 12 4C19 4 23 12 23 12C22.393 13.1356 21.6691 14.2048 20.84 15.19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirmPassword" class="form-input password-input" minlength="6" required>
                        <button type="button" class="password-toggle-btn" id="toggleConfirmPassword" aria-label="Toggle password visibility">
                            <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none"><path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
                            <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" style="display:none;"><path d="M17.94 17.94C16.2306 19.243 14.1491 20 12 20C5 20 1 12 1 12C2.24389 9.68192 3.96914 7.65663 6.06 6.06M9.9 4.24C10.5883 4.0789 11.2931 3.99834 12 4C19 4 23 12 23 12C22.393 13.1356 21.6691 14.2048 20.84 15.19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in here</a>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        (function(){
            const canvas = document.getElementById('starfield');
            const ctx = canvas.getContext('2d');
            let stars = [];
            function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
            function init(){ resize(); stars=Array.from({length:80},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1+0.2,o:Math.random()*0.5+0.1,s:Math.random()*0.003+0.001,d:Math.random()>0.5?1:-1})); }
            function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{ s.o+=s.s*s.d; if(s.o>0.6||s.o<0.1)s.d*=-1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(148,163,184,${s.o})`; ctx.fill(); }); requestAnimationFrame(draw); }
            window.addEventListener('resize',init); init(); draw();

            function setupToggle(btnId, inputId){
                const btn = document.getElementById(btnId);
                const input = document.getElementById(inputId);
                btn.addEventListener('click', function(e){
                    e.preventDefault();
                    const open = this.querySelector('.eye-open');
                    const closed = this.querySelector('.eye-closed');
                    if(input.type==='password'){ input.type='text'; open.style.display='none'; closed.style.display='block'; }
                    else { input.type='password'; open.style.display='block'; closed.style.display='none'; }
                });
            }
            setupToggle('togglePassword','password');
            setupToggle('toggleConfirmPassword','confirmPassword');
        })();

        document.getElementById('registerForm').addEventListener('submit', async function(e){
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const birthdate = document.getElementById('birthdate').value;
            if(password !== confirmPassword){ alert('Passwords do not match!'); return; }
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            try {
                const response = await fetch(`${API_BASE}/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,email,password,birthdate}) });
                const data = await response.json();
                if(response.ok){
                    alert('Account created successfully! Logging you in...');
                    if(data.user){ localStorage.setItem('user', JSON.stringify(data.user)); window.location.href='/dashboard'; }
                    else { window.location.href='/login'; }
                } else {
                    alert(data.error || 'Registration failed');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch(error){
                console.error('Registration error:', error);
                alert('Network error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>
