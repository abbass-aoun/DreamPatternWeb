<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Shop - DreamFlow</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">✨ DreamFlow</div>
            <ul class="navbar-nav">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/achievements">Achievements</a></li>
                <li><a href="/shop">Shop</a></li>
                <li><a href="/chat">AI Analysis</a></li>
                <li><a href="/subscription">Subscription</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding: 3rem 2rem;">
        <div style="max-width: 1000px; margin: 0 auto;">
            <div class="text-center mb-3">
                <h1>🛍️ Dream Shop</h1>
                <p class="text-muted">Spend your Dream Coins on exclusive items!</p>
            </div>

            <!-- User Coins Display -->
            <div id="userCoinsDisplay" class="card" style="text-align: center; margin-bottom: 2rem; background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(217, 119, 6, 0.1));">
                <h2 style="margin: 0;">💎 <span id="userCoins">0</span> Dream Coins</h2>
            </div>

            <!-- Shop Items Grid -->
            <div id="shopItems" class="grid grid-3">
                <p class="text-muted text-center">Loading shop items...</p>
            </div>

            <!-- Purchased Items -->
            <div class="card mt-3">
                <h3>Your Purchases</h3>
                <div id="userPurchases">
                    <p class="text-muted">Loading purchases...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/game.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = checkAuth();
            if (!user) return;

            // Load user coins
            const statsResponse = await fetch(`${API_BASE}/game/stats/${user.user_id}`);
            const stats = await statsResponse.json();
            document.getElementById('userCoins').textContent = stats.dream_coins || 0;

            // Load shop items
            await loadShopItems(user.user_id);

            // Load user purchases
            try {
                const purchasesResponse = await fetch(`${API_BASE}/game/shop/purchases/${user.user_id}`);
                const purchasesData = await purchasesResponse.json();
                
                if (purchasesData.purchases && purchasesData.purchases.length > 0) {
                    document.getElementById('userPurchases').innerHTML = purchasesData.purchases.map(item => `
                        <div style="padding: 1rem; background: var(--bg-darker); border-radius: 0.5rem; margin-bottom: 0.5rem;">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <div style="font-size: 2rem;">${item.item_icon || '🛍️'}</div>
                                <div>
                                    <h4 style="margin: 0;">${item.item_name}</h4>
                                    <p class="text-muted" style="margin: 0; font-size: 0.875rem;">
                                        Purchased: ${new Date(item.purchased_at).toLocaleDateString()}
                                    </p>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('userPurchases').innerHTML = '<p class="text-muted">No purchases yet. Start shopping!</p>';
                }
            } catch (error) {
                console.error('Load purchases error:', error);
            }
        });
    </script>
</body>
</html>
